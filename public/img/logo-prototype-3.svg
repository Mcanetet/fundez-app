<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="Fundez  Prototipo 3: Escudo sopapo">
  <defs>
    <linearGradient id="p3Wood" x1="12" y1="8" x2="36" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4A574"/>
      <stop offset="1" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="p3Gold" x1="24" y1="12" x2="24" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Fondo negro con borde sutil -->
  <rect x="1" y="1" width="46" height="46" rx="14" fill="#0C0C0C"/>
  <rect x="1.5" y="1.5" width="45" height="45" rx="13.5" stroke="#262626" stroke-width="1"/>

  <!-- Sopapo horizontal como escudo -->
  <path d="M8 24c0-6.5 5-11.5 16-11.5S40 17.5 40 24c0 4.5-2.5 8.5-6 11.5l-10 7.5-10-7.5c-3.5-3-6-7-6-11.5z" fill="#141414" stroke="url(#p3Wood)" stroke-width="1.8"/>

  <!-- Entablamento -->
  <path d="M13 20.5h22" stroke="url(#p3Gold)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M12.5 20.5l1.5-2h20l1.5 2" stroke="url(#p3Gold)" stroke-width="1.2" stroke-linejoin="round" fill="none"/>

  <!-- 4 pilares cl�sicos -->
  <g stroke="url(#p3Gold)" stroke-width="1.15" fill="none">
    <rect x="14.5" y="20.5" width="2.2" height="9" rx="0.4"/>
    <rect x="19.5" y="20.5" width="2.2" height="9" rx="0.4"/>
    <rect x="26.3" y="20.5" width="2.2" height="9" rx="0.4"/>
    <rect x="31.3" y="20.5" width="2.2" height="9" rx="0.4"/>
    <!-- L�neas de canelado -->
    <line x1="15.2" y1="21.5" x2="15.2" y2="29" opacity="0.5"/>
    <line x1="16" y1="21.5" x2="16" y2="29" opacity="0.5"/>
    <line x1="20.2" y1="21.5" x2="20.2" y2="29" opacity="0.5"/>
    <line x1="21" y1="21.5" x2="21" y2="29" opacity="0.5"/>
    <line x1="27" y1="21.5" x2="27" y2="29" opacity="0.5"/>
    <line x1="27.8" y1="21.5" x2="27.8" y2="29" opacity="0.5"/>
    <line x1="32" y1="21.5" x2="32" y2="29" opacity="0.5"/>
    <line x1="32.8" y1="21.5" x2="32.8" y2="29" opacity="0.5"/>
  </g>

  <!-- Base -->
  <path d="M13.5 29.5h21" stroke="url(#p3Gold)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Mango del sopapo saliendo abajo -->
  <rect x="22" y="36" width="4" height="7" rx="1.5" fill="url(#p3Wood)"/>
