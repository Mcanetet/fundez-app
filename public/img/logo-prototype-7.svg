  <path d="M24 11.5L35.5 21v13.5c0 1.1-.9 2-2 2H14.5c-1.1 0-2-.9-2-2V21L24 11.5z" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round" fill="none"/>

