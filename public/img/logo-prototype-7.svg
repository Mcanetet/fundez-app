    <path d="M-5.5 2.5c2.2 2.8 5.3 4.2 5.5 4.2s3.3-1.4 5.5-4.2" stroke="#FFFFFF" stroke-width="1.45" stroke-linecap="round" fill="none"/>
    <!-- Iris y pupila -->
    <circle cx="0" cy="2.5" r="2.1" stroke="#FFFFFF" stroke-width="1.25" fill="none"/>
    <circle cx="0" cy="2.5" r="0.85" fill="#FFFFFF"/>
